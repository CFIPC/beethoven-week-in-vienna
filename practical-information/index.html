<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Information - Beethoven Week in Vienna</title>
    <!-- Preload logo for instant availability -->
    <link rel="preload" fetchpriority="high" as="image" href="logo.png" type="image/png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for JSX support in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff;
            margin: 0;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1a6a1; border-radius: 10px; }
        
        .header-transition {
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }
        
        .mobile-menu-enter {
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Consistency with home and masterclass pages */
        @media (max-width: 1024px) {
            .mobile-non-sticky {
                position: relative !important;
                top: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Music: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            ),
            Menu: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
            ),
            X: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
            ),
            CheckCircle: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#d1a6a1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            ),
            Social: {
                Facebook: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>,
                Instagram: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>,
                Twitter: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
            }
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [formStatus, setFormStatus] = useState('idle');

            const applicationLink = "https://forms.fillout.com/t/nNCmHVSCspus";
            const contactEmail = "office@themusicagency.eu";

            useEffect(() => {
                const handleScroll = () => {
                    if (window.scrollY > 50) {
                        setIsScrolled(true);
                    } else {
                        setIsScrolled(false);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleContactSubmit = async (e) => {
                e.preventDefault();
                setFormStatus('sending');
                const formData = new FormData(e.target);
                try {
                    const response = await fetch('https://formspree.io/f/xdalwann', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    });
                    if (response.ok) {
                        setFormStatus('success');
                        e.target.reset();
                        setTimeout(() => setFormStatus('idle'), 5000);
                    } else { throw new Error(); }
                } catch (error) {
                    setFormStatus('error');
                    setTimeout(() => setFormStatus('idle'), 5000);
                }
            };

            const Header = () => {
                const textColor = 'text-black';
                const borderColor = 'border-stone-200';
                const headerBg = 'bg-white/95';
                
                return (
                    <header className={`fixed top-0 left-0 right-0 z-50 header-transition backdrop-blur-md border-b ${headerBg} ${borderColor}`}>
                        <div className="max-w-7xl mx-auto px-4 md:px-6 h-20 md:h-28 flex items-center relative">
                            
                            {/* Desktop Navigation - Left Side (Switch at 1024px) */}
                            <div className="hidden lg:flex flex-1 items-center gap-6 xl:gap-10">
                                <a 
                                    href="/masterclass"
                                    className={`text-[10px] xl:text-[11px] font-bold tracking-[0.2em] transition-colors hover:opacity-60 whitespace-nowrap ${textColor}`}
                                >
                                    THE MASTERCLASS
                                </a>
                                <a 
                                    href="/practical-information"
                                    className={`text-[10px] xl:text-[11px] font-bold tracking-[0.2em] transition-colors hover:opacity-60 whitespace-nowrap ${textColor} underline decoration-[#d1a6a1] underline-offset-8`}
                                >
                                    PRACTICAL INFORMATION
                                </a>
                            </div>

                            {/* Mobile Hamburger Toggle - Left Side */}
                            <div className="flex lg:hidden flex-1 items-center">
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className={textColor}>
                                    {isMobileMenuOpen ? <Icons.X /> : <Icons.Menu />}
                                </button>
                            </div>

                            {/* Logo - Middle */}
                            <a href="/" className="flex items-center gap-2 md:gap-4 cursor-pointer absolute left-1/2 -translate-x-1/2">
                                <img src="logo.png" alt="Logo" className="h-10 md:h-14 xl:h-16 w-auto object-contain" fetchpriority="high" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                <div style={{display: 'none'}} className="flex items-center justify-center"><Icons.Music /></div>
                                <div className="flex flex-col leading-none">
                                    <span className={`text-[10px] md:text-[12px] xl:text-[14px] font-serif uppercase tracking-[0.1em] md:tracking-[0.2em] block font-bold ${textColor}`}>Beethoven Week</span>
                                    <span className={`text-[8px] md:text-[10px] xl:text-[12px] font-serif uppercase tracking-widest block opacity-70 ${textColor}`}>in Vienna</span>
                                </div>
                            </a>

                            {/* Application - Right Side */}
                            <div className="flex flex-1 items-center justify-end">
                                <a href={applicationLink} target="_blank" className={`text-[9px] md:text-[11px] font-bold uppercase tracking-[0.1em] md:tracking-[0.2em] border px-4 md:px-8 py-2 md:py-3 rounded-sm transition-all whitespace-nowrap text-black border-black hover:bg-black hover:text-white`}>Application</a>
                            </div>
                        </div>

                        {/* Mobile Menu Dropdown */}
                        {isMobileMenuOpen && (
                            <div className="lg:hidden bg-white border-t border-stone-100 mobile-menu-enter px-6 py-8 flex flex-col gap-6 shadow-xl">
                                <a href="/masterclass" className="text-[11px] font-bold tracking-[0.2em] text-left text-black">THE MASTERCLASS</a>
                                <a href="/practical-information" className="text-[11px] font-bold tracking-[0.2em] text-left text-[#d1a6a1]">PRACTICAL INFORMATION</a>
                            </div>
                        )}
                    </header>
                );
            };

            return (
                <div className="min-h-screen bg-white font-sans selection:bg-[#d1a6a1]/20">
                    <Header />
                    <main className="pt-24 lg:pt-32 animate-in fade-in duration-700 bg-white min-h-screen">
                        <div className="max-w-7xl mx-auto px-6 lg:px-12">
                            <div className="grid lg:grid-cols-2 gap-16 md:gap-24 pb-24 items-start">
                                <div className="space-y-12">
                                    <h1 className="font-serif text-3xl md:text-4xl text-[#d1a6a1] italic border-b border-stone-100 pb-6">Practical Information</h1>
                                    <div className="space-y-8">
                                        {[
                                            { label: "Masterclass Locations", content: "MusikQuartier 1040 , Mühlgasse 30 , 1040 Wien\nMusikQuartier 1070 , Kaiserstraße 10 , 1070 Wien" },
                                            { label: "Concert Locations", content: "Palais Ehrbar (Mühlgasse 30 , 1040 Wien)" },
                                            { label: "Lecture Location", content: "Ensembleraum (MusikQuartier 1070)" },
                                            { label: "Contact", content: "Cristiana Dragos :\n+32 456 708 920\n" + contactEmail },
                                            { label: "Contact", content: "Ana Boca :\ninfo@themusicagency.eu" }
                                        ].map((item, i) => (
                                            <div key={i} className="flex flex-col border-b border-stone-100 pb-6">
                                                <span className="text-[10px] uppercase tracking-widest text-stone-400 font-bold mb-2">{item.label}</span>
                                                <div className="text-stone-700 text-sm md:text-base italic whitespace-pre-line">{item.content}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="bg-[#e7e3da]/40 p-6 md:p-14 rounded-sm border border-stone-100 shadow-sm">
                                    <h2 className="font-serif text-2xl md:text-3xl text-stone-800 italic mb-6">Contact us</h2>
                                    {formStatus === 'success' ? (
                                        <div className="py-16 text-center animate-in zoom-in duration-500">
                                            <Icons.CheckCircle />
                                            <h3 className="font-serif text-2xl italic mt-6 mb-3">Message Sent !</h3>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleContactSubmit} className="space-y-6">
                                            <input required name="name" type="text" placeholder="Name" className="w-full bg-stone-50/50 border border-stone-200 px-4 md:px-5 py-3 md:py-4 rounded-sm text-sm" />
                                            <input required name="email" type="email" placeholder="Email" className="w-full bg-stone-50/50 border border-stone-200 px-4 md:px-5 py-3 md:py-4 rounded-sm text-sm" />
                                            <textarea required name="message" rows="4" placeholder="Message" className="w-full bg-stone-50/50 border border-stone-200 px-4 md:px-5 py-3 md:py-4 rounded-sm resize-none text-sm"></textarea>
                                            <button disabled={formStatus === 'sending'} type="submit" className="w-full md:w-auto px-10 md:px-16 py-4 bg-[#c2a38a] text-white uppercase tracking-widest text-[10px] font-bold rounded-sm shadow-xl transition-opacity">
                                                {formStatus === 'sending' ? 'Sending...' : 'Submit'}
                                            </button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                    <footer className="py-12 md:py-16 border-t border-stone-100 flex flex-col items-center px-6">
                        <h3 className="font-serif text-2xl md:text-3xl italic text-stone-800 mb-6">The Music Agency</h3>
                        <div className="flex justify-center gap-8 md:gap-10 text-stone-400 mb-8">
                            <Icons.Social.Facebook />
                            <Icons.Social.Instagram />
                            <Icons.Social.Twitter />
                        </div>
                        <p className="text-center text-[9px] uppercase tracking-[0.3em] text-stone-300 font-bold italic">Beethoven Week in Vienna 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
